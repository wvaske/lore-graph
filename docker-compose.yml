services:
  neo4j:
    image: neo4j:5-community
    container_name: lore-graph-neo4j
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-change-me}"
      # APOC + Graph Data Science (GDS reserved for Phase 6 graph ML).
      # Native vector index is built into 5.x — no plugin needed for hybrid retrieval.
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
    volumes:
      - ./neo4j_data:/data
